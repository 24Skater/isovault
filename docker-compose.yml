services:
  isovault:
    build:
      context: .
      target: runner
    image: isovault:latest
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "3721:3721"
    volumes:
      - /path/to/iso-store:/data/iso-store
      - isovault-db:/data/db
      - ./config.yaml:/app/config.yaml:ro
      - /tmp/isovault:/tmp/isovault
    environment:
      NODE_ENV: production
      ISO_MANAGER_API_KEY: ${ISO_MANAGER_API_KEY:-}
      ISO_STORE_PATH: /data/iso-store
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3721/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  isovault-db:
