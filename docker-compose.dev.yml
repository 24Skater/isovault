# Development override — mounts source + uses tsx watch
services:
  isovault:
    build:
      context: .
      target: deps
    command: npm run dev -w packages/backend
    ports:
      - "3721:3721"
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/backend/node_modules
      - /app/packages/frontend/node_modules
    environment:
      NODE_ENV: development
      ISO_MANAGER_DB_PATH: /tmp/isovault/iso-manager.sqlite3
      ISO_STORE_PATH: /tmp/isovault/iso-store
    user: "0:0"
