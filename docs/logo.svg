<svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#0f1e38"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
  </defs>

  <!-- Flat-top hexagon R=44, center (48,48) -->
  <!-- 0°(92,48) 60°(70,86.1) 120°(26,86.1) 180°(4,48) 240°(26,9.9) 300°(70,9.9) -->
  <polygon points="92,48 70,86.1 26,86.1 4,48 26,9.9 70,9.9"
           fill="url(#bg)" stroke="#2563eb" stroke-width="2.5"/>

  <!-- Inner hex R=32 -->
  <!-- 0°(80,48) 60°(64,75.7) 120°(32,75.7) 180°(16,48) 240°(32,20.3) 300°(64,20.3) -->
  <polygon points="80,48 64,75.7 32,75.7 16,48 32,20.3 64,20.3"
           fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.5"/>

  <!-- Spoke lines -->
  <line x1="48" y1="48" x2="92" y2="48" stroke="#0f2244" stroke-width="1"/>
  <line x1="48" y1="48" x2="70" y2="9.9" stroke="#0f2244" stroke-width="1"/>
  <line x1="48" y1="48" x2="26" y2="9.9" stroke="#0f2244" stroke-width="1"/>
  <line x1="48" y1="48" x2="4" y2="48" stroke="#0f2244" stroke-width="1"/>
  <line x1="48" y1="48" x2="26" y2="86.1" stroke="#0f2244" stroke-width="1"/>
  <line x1="48" y1="48" x2="70" y2="86.1" stroke="#0f2244" stroke-width="1"/>

  <!-- Lock body: center (48,58), w=34, h=24 -->
  <rect x="31" y="50" width="34" height="24" rx="3.5" fill="#060c18" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- Shackle: entry (38,50) and (58,50), peak r=10 -->
  <path d="M 38 50 L 38 39 A 10 10 0 0 1 58 39 L 58 50"
        fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="48" cy="60.5" r="4" fill="#1d4ed8"/>
  <rect x="46" y="60.5" width="4" height="7" rx="2" fill="#1d4ed8"/>
</svg>
