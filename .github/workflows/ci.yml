name: CI

on:
  push:
    branches: [main, develop, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  # ─── Typecheck ─────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  # ─── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test -w packages/backend
        env:
          NODE_ENV: test
          ISO_MANAGER_DB_PATH: /tmp/isovault-test.sqlite3
          ISO_STORE_PATH: /tmp/isovault-test-store

  # ─── Audit ─────────────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
        # fast-uri <=3.1.1 HIGH via fastify@4 chain — requires fastify v5 to resolve (TODO: upgrade)
      - run: npm audit --audit-level=critical -w packages/backend
      - run: npm audit --audit-level=critical -w packages/frontend

  # ─── Backend build ─────────────────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build -w packages/backend
      - uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: packages/backend/dist/
          retention-days: 7

  # ─── Frontend build ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build -w packages/frontend
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist/
          retention-days: 7

  # ─── E2E tests ─────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Download backend dist
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: packages/backend/dist/
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist/
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: packages/e2e
      - name: Create e2e env file
        run: echo "ISO_MANAGER_API_KEY=${{ secrets.E2E_API_KEY || 'ci-e2e-api-key-isovault' }}" > packages/e2e/.env.e2e
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        working-directory: packages/e2e
        env:
          CI: "true"
          ISO_MANAGER_API_KEY: ${{ secrets.E2E_API_KEY || 'ci-e2e-api-key-isovault' }}
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/e2e/playwright-report/
          retention-days: 7

  # ─── Docker build ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Download backend dist
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: packages/backend/dist/
      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: packages/frontend/dist/
      - name: Build Docker image
        run: docker build --target runner -t isovault:ci .
